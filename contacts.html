<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#170B58">
  <title>Ritmo Latino - Контакти</title>
  <meta name="description" content="Мобільна сторінка контактів танцювального клубу Ritmo Latino з короткою формою запису.">
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="preload" as="style" href="assets/css/style.css">
  <link href="assets/vendor/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="site-body">
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="index.html" aria-label="Ritmo Latino - на головну">Ritmo Latino</a>
      <button class="menu-toggle" type="button" data-menu-toggle aria-controls="main-menu" aria-expanded="false" aria-label="Відкрити меню">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" id="main-menu" data-site-nav aria-label="Головне меню">
        <ul>
          <li><a href="index.html">Головна</a></li> <li><a href="about.html">Про клуб</a></li> <li><a href="trainers.html">Тренери</a></li> <li><a class="active" href="contacts.html">Контакти</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main>
    <section class="mobile-section" aria-labelledby="contacts-title">
      <h1 id="contacts-title" class="page-title">Контакти</h1>
      <div class="contacts-list">
        <div class="contact-item"><strong>Адреса:&nbsp;</strong> вул. Велика Танцювальна, 24, Київ</div>
        <div class="contact-item"><strong>Телефон:&nbsp;</strong> <a href="tel:+380671234567">+38 (067) 123-45-67</a></div>
        <div class="contact-item"><strong>Робочі години:&nbsp;</strong> Пн-Пт: 10:00 - 22:00</div>
        <div class="contact-item"><strong>Пошта:&nbsp;</strong> <a href="mailto:dance@ritmolatino.ua">dance@ritmolatino.ua</a></div>
      </div>

      <section class="signup-panel" aria-labelledby="signup-title">
        <h2 id="signup-title">Коротка форма запису</h2>
        <form id="signup-form" data-signup-form autocomplete="on" action="mailto:dance@ritmolatino.ua" method="post" enctype="text/plain">
          <div class="form-field">
            <label for="name">Ім'я</label>
            <input id="name" type="text" name="Ім'я" autocomplete="name" required>
          </div>
          <div class="form-field">
            <label for="phone">Телефон</label>
            <input
  id="phone"
  type="tel"
  name="phone"
  autocomplete="tel"
  inputmode="tel"
  placeholder="+38 (___) ___-__-__"
  required
>
          </div>
          <div class="form-field">
            <label for="direction">Напрямок</label>
            <select id="direction" name="direction" autocomplete="off" required>
              <option value="" selected disabled>Оберіть напрямок</option>
              <option value="Сальса">Сальса</option>
              <option value="Бачата">Бачата</option>
              <option value="Румба">Румба</option>
              <option value="Ча-ча-ча">Ча-ча-ча</option>
            </select>
          </div>
          <button class="primary-btn" type="submit">Відправити</button>
          <p class="form-note" data-form-status></p>
        </form>
      </section>
    </section>
  </main>
  <footer class="site-footer">Ritmo Latino © 2026</footer>
</div>
<script src="assets/vendor/bootstrap.bundle.min.js"></script>
<script src="assets/js/script.js"></script>
</body>
</html>
